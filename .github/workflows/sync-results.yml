name: sync wc results

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: sync-results
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: call sync endpoint
        run: |
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -H "X-Auth-Token: ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP %{http_code}\n" \
            "${{ secrets.SYNC_URL }}"
